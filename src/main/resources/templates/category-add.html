<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Category</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="col-4 offset-4 mt-5 pt-5">
    <form class="card px-4 py-4 mt-5" method="post" th:action="@{'/category/add'}">
      <h2 class="text-center mb-4">Add Category</h2>
      <div class="form-floating mb-4">
        <input type="text" class="form-control" id="category_name" placeholder="category_name" name="category_name" required>
        <label for="category_name">Category</label>
      </div>
      <div class="d-grid gap-2 col-4 mx-auto">
        <button class="btn btn-success" type="submit">SAVE</button>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
