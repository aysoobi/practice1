<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-danger navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{'/food/main'}">Food Repository</a>
    </div>
</nav>

<div class="container">
    <div class="row mt-5">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 fw-bold text-primary">Update Food Item</h2>

                    <form th:action="@{'/food/update'}" method="post">

                        <input type="hidden" name="id" th:value="${food.id}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Food Name</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   th:value="${food.name}" required shadow-sm>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="calories" class="form-label">Calories</label>
                                <input type="number" class="form-control" id="calories" name="calories"
                                       th:value="${food.calories}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="amount" class="form-label">Amount</label>
                                <input type="number" class="form-control" id="amount" name="amount"
                                       th:value="${food.amount}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="price" class="form-label">Price ($)</label>
                            <input type="number" step="0.01" class="form-control" id="price" name="price"
                                   th:value="${food.price}" required>
                        </div>

                        <div class="form-floating mb-3">
                            <select class="form-select" id="country_id" aria-label="country_id" name="country_id" required>
                                <option th:each="country : ${countries}" th:value="${country.id}" th:text="${country.name + ' / ' + country.code}"  th:selected="${food.manufacturer != null && country.id.equals(food.manufacturer.id)}"></option>
                            </select>
                            <label for="country_id">Country-manufacturer</label>
                        </div>



                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Update Changes</button>
                            <a th:href="@{'/food/main'}" class="btn btn-link text-secondary text-decoration-none">Cancel</a>
                        </div>
                    </form>

                    <h5 class="mt-4 mb-3 text-secondary">Assigned Categories</h5>
                    <div class="d-flex flex-wrap gap-2">
                        <div th:each="category : ${food.categories}">
                            <form method="post" th:action="@{'/food/unassigncategory'}" class="m-0">
                                <input type="hidden" name="category_id" th:value="${category.id}">
                                <input type="hidden" name="food_id" th:value="${food.id}">

                                <div class="btn-group shadow-sm" role="group">
                <span class="btn btn-outline-danger btn-sm disabled text-dark border-end-0"
                      th:text="${category.name}" style="opacity: 1;">Category</span>
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            title="Remove Category">
                                        <i class="bi bi-x">&times;</i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <hr class="my-4 opacity-25">

                    <h5 class="mb-3 text-secondary">Available Categories</h5>
                    <div class="d-flex flex-wrap gap-2">
                        <div th:each="category : ${categories}">
                            <form method="post" th:action="@{'/food/assigncategory'}" class="m-0">
                                <input type="hidden" name="category_id" th:value="${category.id}">
                                <input type="hidden" name="food_id" th:value="${food.id}">

                                <button type="submit" class="btn btn-outline-success btn-sm rounded-pill px-3">
                                    + <span th:text="${category.name}">Category</span>
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
